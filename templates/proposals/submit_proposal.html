{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-semibold mb-2">Submit Proposal</h1>
    <p class="text-gray-600 mb-8">For: <strong>{{ task.title }}</strong></p>

    <div class="bg-white border rounded-3xl p-8">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" 
                    class="mt-8 w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl text-lg">
                Submit My Proposal
            </button>
        </form>
    </div>
    
    <div class="text-center mt-6">
        <a href="{% url 'tasks:task_detail' task.id %}" class="text-blue-600 hover:underline">
            ← Back to Task
        </a>
    </div>
</div>
{% endblock %}
