{% extends "base.html" %}
{% block body_class %}auth-body{% endblock %}

{% block content %}
<div class="auth-shell">

  <div class="auth-brand">
    <a href="/" class="auth-brand__logo">
      <span class="auth-brand__mark">E</span>
      <span class="auth-brand__name">EngiConnect</span>
    </a>
    <p class="auth-brand__tagline">Engineering services,<br>remotely delivered.</p>
    <svg viewBox="0 0 400 280" fill="none" xmlns="http://www.w3.org/2000/svg" class="auth-illustration">
      <defs>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M20 0L0 0 0 20" fill="none" stroke="currentColor" stroke-width="0.3" opacity="0.25"/>
        </pattern>
      </defs>
      <rect width="400" height="280" fill="url(#grid)"/>
      <rect x="80" y="70" width="240" height="170" rx="2" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.7"/>
      <rect x="108" y="98"  width="38" height="32" rx="1" stroke="currentColor" stroke-width="1" fill="rgba(255,255,255,.06)"/>
      <rect x="163" y="98"  width="38" height="32" rx="1" stroke="currentColor" stroke-width="1" fill="rgba(255,255,255,.06)"/>
      <rect x="218" y="98"  width="38" height="32" rx="1" stroke="currentColor" stroke-width="1" fill="rgba(255,255,255,.06)"/>
      <rect x="108" y="150" width="38" height="32" rx="1" stroke="currentColor" stroke-width="1" fill="rgba(255,255,255,.04)"/>
      <rect x="218" y="150" width="38" height="32" rx="1" stroke="currentColor" stroke-width="1" fill="rgba(255,255,255,.04)"/>
      <rect x="170" y="182" width="34" height="58" rx="1" stroke="currentColor" stroke-width="1" fill="none" opacity="0.6"/>
      <line x1="58" y1="70"  x2="58"  y2="240" stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
      <line x1="53" y1="70"  x2="63"  y2="70"  stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
      <line x1="53" y1="240" x2="63"  y2="240" stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
      <line x1="80" y1="256" x2="320" y2="256" stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
      <line x1="80"  y1="251" x2="80"  y2="261" stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
      <line x1="320" y1="251" x2="320" y2="261" stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
      <text x="40" y="163" font-size="7.5" fill="currentColor" opacity="0.5" font-family="DM Mono, monospace" transform="rotate(-90,40,163)">12 000 mm</text>
      <text x="172" y="270" font-size="7.5" fill="currentColor" opacity="0.5" font-family="DM Mono, monospace" text-anchor="middle">18 000 mm</text>
    </svg>
  </div>

  <div class="auth-card">
    {% block auth_content %}{% endblock %}
  </div>

</div>
{% endblock %}
