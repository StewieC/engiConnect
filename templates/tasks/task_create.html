{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-semibold mb-8">Post a New Engineering Task</h1>
    
    <div class="bg-white border rounded-3xl p-8">
        <form method="post">
            {% csrf_token %}
            <div class="space-y-6">
                {{ form.as_p }}
            </div>
            <button type="submit" 
                    class="mt-10 w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl text-lg font-medium">
                Post Task
            </button>
        </form>
    </div>
</div>
{% endblock %}
