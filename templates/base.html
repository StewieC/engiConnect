<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {%load static%}
    <title>EngiConnect - Engineering Tasks</title>
    
    <!-- Tailwind CDN - clean professional look -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <script>
        tailwind.config = {
            content: [],
            theme: {
                extend: {}
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900">
    <!-- Navbar -->
    <nav class="bg-white border-b shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <a href="/" class="text-3xl font-bold text-blue-600 tracking-tight">EngiConnect</a>
            
            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="{% url 'tasks:task_list' %}" class="hover:text-blue-600 transition">Browse Tasks</a>
                <a href="{% url 'tasks:task_create' %}" class="hover:text-blue-600 transition">Post a Task</a>
                <a href="#" class="hover:text-blue-600 transition">How it Works</a>
            </div>

            <div class="flex items-center gap-4">
                <span class="text-xs px-3 py-1 bg-amber-100 text-amber-700 rounded-full">Demo Mode • No Login</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t py-8 text-center text-gray-500 text-sm">
        EngiConnect • Building step by step • Commission feature coming later
    </footer>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
